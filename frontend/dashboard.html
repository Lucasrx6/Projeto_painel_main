<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Painéis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/frontend/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-content">
                <h1>Sistema de Painéis</h1>
                <div class="user-info">
                    <span id="usuario-nome">Carregando...</span>
                    <button id="btn-admin" class="btn-admin" style="display: none;">
                        <i class="fas fa-user-plus"></i> Cadastrar Usuário
                    </button>
                    <button id="btn-logout" class="btn-logout">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                </div>
            </div>
        </header>

        <!-- Painéis -->
        <main class="paineis-grid">
            <div class="painel-card painel-disabled">
                <div class="painel-icon ">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h3>Painel Teste</h3>
                <p>Primeiro painel do sistema</p>
                <div class="painel-status">
                    <i class="fas fa-circle status-active"></i> Ativo
                </div>
            </div>

            <div class="painel-card" onclick="abrirPainel('painel2')">
                <div class="painel-icon">
                    <i class="fas fa-notes-medical"></i>
                </div>
                <h3>Painel Evolução-Turno</h3>
                <p>Evolução de Turno</p>
                <div class="painel-status">
                    <i class="fas fa-circle status-active"></i> Ativo
                </div>
            </div>

            <div class="painel-card painel-disabled">
                <div class="painel-icon">
                    <i class="fas fa-plus-circle"></i>
                </div>
                <h3>Novo Painel</h3>
                <p>Em breve...</p>
                <div class="painel-status">
                    <i class="fas fa-circle status-inactive"></i> Em desenvolvimento
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Cadastro -->
    <div id="modal-cadastro" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-user-plus"></i> Cadastrar Novo Usuário</h2>
                <button class="btn-close-modal" onclick="fecharModal()">&times;</button>
            </div>
            <form id="form-cadastro">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="novo-usuario" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="novo-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="nova-senha" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Confirmar Senha</label>
                    <input type="password" id="confirma-senha" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="is-admin"> Administrador
                    </label>
                </div>
                <div id="mensagem-cadastro" class="alert" style="display: none;"></div>
                <div class="modal-buttons">
                    <button type="button" class="btn-secondary" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn-primary">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/frontend/dashboard.js"></script>
</body>
</html>

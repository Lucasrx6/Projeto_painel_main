<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração de Terminal TV — Hospital Anchieta</title>
    <link rel="icon" href="/static/img/favicon.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1b2a;
            color: #e8edf2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #1a2a3a;
            border: 1px solid #2a3f55;
            border-radius: 12px;
            padding: 48px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            color: #a8c8e8;
            margin-bottom: 8px;
        }

        .subtitulo {
            font-size: 14px;
            color: #6a8fa8;
            margin-bottom: 32px;
        }

        .status {
            padding: 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
        }

        .status.ok {
            background: #0f3020;
            border: 1px solid #1a5035;
            color: #4caf87;
        }

        .status.erro {
            background: #2d1010;
            border: 1px solid #5a1a1a;
            color: #e05c5c;
        }

        .status.aguardando {
            background: #1a2a3a;
            border: 1px solid #2a4060;
            color: #6a8fa8;
        }

        .detalhe {
            margin-top: 12px;
            font-size: 12px;
            opacity: 0.7;
        }

        .icone {
            font-size: 32px;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📺</div>
        <h1>Configuração de Terminal TV</h1>
        <p class="subtitulo">Hospital Anchieta Ceilândia — Sistema de Painéis</p>
        <div id="status" class="status aguardando">
            <span class="icone">⏳</span>
            Configurando terminal…
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        var statusEl = document.getElementById('status');

        function mostrar(tipo, icone, mensagem, detalhe) {
            statusEl.className = 'status ' + tipo;
            statusEl.innerHTML =
                '<span class="icone">' + icone + '</span>' +
                mensagem +
                (detalhe ? '<div class="detalhe">' + detalhe + '</div>' : '');
        }

        function obterParam(nome) {
            var params = new URLSearchParams(window.location.search);
            return params.get(nome);
        }

        var token = obterParam('token');

        if (!token) {
            mostrar(
                'erro', '❌',
                'Token não encontrado.',
                'Acesse esta página via link fornecido pelo administrador.'
            );
            return;
        }

        // Verifica o token com o servidor antes de salvar
        fetch('/api/tv-login', {
            method: 'POST',
            credentials: 'same-origin',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({token: token})
        })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            if (data.success) {
                localStorage.setItem('tv_device_token', token);
                mostrar(
                    'ok', '✅',
                    'Terminal configurado: <strong>' + data.dispositivo + '</strong>',
                    'Token salvo. Esta página pode ser fechada. O terminal reconectará automaticamente ao expirar a sessão.'
                );
            } else {
                mostrar(
                    'erro', '❌',
                    'Token inválido ou revogado.',
                    data.error || 'Contate o administrador para obter um novo link de configuração.'
                );
            }
        })
        .catch(function () {
            mostrar(
                'erro', '⚠️',
                'Erro de comunicação com o servidor.',
                'Verifique a conexão de rede e tente novamente.'
            );
        });
    })();
    </script>
</body>
</html>

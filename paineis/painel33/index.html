<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autorizações de Convênio - Hospital Anchieta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/paineis/painel33/style.css">
    <link rel="icon" href="/static/img/favicon.png">
    <link rel="stylesheet" href="/frontend/tema.css">
    <script>if(localStorage.getItem('tema_sistema')==='azul')document.documentElement.classList.add('tema-azul');</script>
</head>
<body>
<div class="painel-container">

    <!-- CABECALHO -->
    <header class="painel-header">
        <div class="header-content">
            <div class="header-left">
                <img src="/static/img/logo.png" alt="HAC" class="header-logo" onerror="this.style.display='none'">
                <div class="header-title">
                    <h1><i class="fas fa-shield-halved"></i> Autorizações de Convênio</h1>
                    <span class="header-subtitle">Controle de autorizações e SLA por convênio</span>
                </div>
            </div>
            <div class="header-right">
                <button id="btn-toggle-filtros" class="btn-header">
                    <i class="fas fa-filter"></i> <span class="btn-text">Filtros</span>
                </button>
                <button id="btn-export" class="btn-header" title="Exportar CSV">
                    <i class="fas fa-file-csv"></i> <span class="btn-text">Exportar</span>
                </button>
                <button id="btn-autoscroll" class="btn-header ativo" title="Parar/Iniciar Auto-scroll">
                    <i class="fas fa-arrows-up-down"></i> <span class="btn-text">Auto-scroll</span>
                </button>
                <button id="btn-refresh" class="btn-header" title="Atualizar">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button id="btn-voltar" class="btn-header" title="Voltar">
                    <i class="fas fa-arrow-left"></i> <span class="btn-text">Voltar</span>
                </button>
                <div class="header-status">
                    <span class="status-indicator" id="status-indicator"></span>
                    <span class="ultima-atualizacao" id="ultima-atualizacao">--:--</span>
                </div>
            </div>
        </div>
    </header>

    <!-- FILTROS BAR (multi-select painel21 pattern) -->
    <div class="filtros-bar" id="filtros-bar" style="display:none;">
        <div class="filtros-content">

            <!-- Grupo/Status - multi-select fixo -->
            <div class="filtro-grupo">
                <label>Estágio</label>
                <div class="multi-select-container" id="ms-estagio" data-state-key="msEstagio" data-placeholder="Todos">
                    <button type="button" class="multi-select-trigger ms-trigger" aria-haspopup="listbox" aria-expanded="false">
                        <span class="multi-select-label">Todos</span>
                        <i class="fas fa-chevron-down multi-select-arrow"></i>
                    </button>
                    <div class="multi-select-dropdown">
                        <div class="multi-select-actions">
                            <button type="button" class="btn-select-action btn-ms-all"><i class="fas fa-check-double"></i> Todos</button>
                            <button type="button" class="btn-select-action btn-ms-none"><i class="fas fa-times"></i> Limpar</button>
                        </div>
                        <div class="multi-select-options">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Semáforo - multi-select fixo -->
            <div class="filtro-grupo">
                <label>Semáforo</label>
                <div class="multi-select-container" id="ms-semaforo" data-state-key="msSemaforo" data-placeholder="Todos">
                    <button type="button" class="multi-select-trigger ms-trigger" aria-haspopup="listbox" aria-expanded="false">
                        <span class="multi-select-label">Todos</span>
                        <i class="fas fa-chevron-down multi-select-arrow"></i>
                    </button>
                    <div class="multi-select-dropdown">
                        <div class="multi-select-actions">
                            <button type="button" class="btn-select-action btn-ms-all"><i class="fas fa-check-double"></i> Todos</button>
                            <button type="button" class="btn-select-action btn-ms-none"><i class="fas fa-times"></i> Limpar</button>
                        </div>
                        <div class="multi-select-options">
                            <label class="multi-select-item"><input type="checkbox" class="multi-select-checkbox" value="verde"> <span class="multi-select-item-text">🟢 Verde</span></label>
                            <label class="multi-select-item"><input type="checkbox" class="multi-select-checkbox" value="amarelo"> <span class="multi-select-item-text">🟡 Amarelo</span></label>
                            <label class="multi-select-item"><input type="checkbox" class="multi-select-checkbox" value="laranja"> <span class="multi-select-item-text">🟠 Laranja</span></label>
                            <label class="multi-select-item"><input type="checkbox" class="multi-select-checkbox" value="vermelho"> <span class="multi-select-item-text">🔴 Vermelho</span></label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Convênio - multi-select dinâmico -->
            <div class="filtro-grupo">
                <label>Convênio</label>
                <div class="multi-select-container" id="ms-convenio" data-state-key="msConvenio" data-placeholder="Todos">
                    <button type="button" class="multi-select-trigger ms-trigger" aria-haspopup="listbox" aria-expanded="false">
                        <span class="multi-select-label">Todos</span>
                        <i class="fas fa-chevron-down multi-select-arrow"></i>
                    </button>
                    <div class="multi-select-dropdown">
                        <div class="multi-select-actions">
                            <button type="button" class="btn-select-action btn-ms-all"><i class="fas fa-check-double"></i> Todos</button>
                            <button type="button" class="btn-select-action btn-ms-none"><i class="fas fa-times"></i> Limpar</button>
                        </div>
                        <div class="multi-select-options"></div>
                    </div>
                </div>
            </div>

            <!-- Tipo Guia - multi-select dinâmico -->
            <div class="filtro-grupo">
                <label>Tipo Guia</label>
                <div class="multi-select-container" id="ms-tipo-guia" data-state-key="msTipoGuia" data-placeholder="Todos">
                    <button type="button" class="multi-select-trigger ms-trigger" aria-haspopup="listbox" aria-expanded="false">
                        <span class="multi-select-label">Todos</span>
                        <i class="fas fa-chevron-down multi-select-arrow"></i>
                    </button>
                    <div class="multi-select-dropdown">
                        <div class="multi-select-actions">
                            <button type="button" class="btn-select-action btn-ms-all"><i class="fas fa-check-double"></i> Todos</button>
                            <button type="button" class="btn-select-action btn-ms-none"><i class="fas fa-times"></i> Limpar</button>
                        </div>
                        <div class="multi-select-options"></div>
                    </div>
                </div>
            </div>

            <!-- Tipo Autor. - multi-select dinâmico -->
            <div class="filtro-grupo">
                <label>Tipo Autor.</label>
                <div class="multi-select-container" id="ms-tipo-autor" data-state-key="msTipoAutor" data-placeholder="Todos">
                    <button type="button" class="multi-select-trigger ms-trigger" aria-haspopup="listbox" aria-expanded="false">
                        <span class="multi-select-label">Todos</span>
                        <i class="fas fa-chevron-down multi-select-arrow"></i>
                    </button>
                    <div class="multi-select-dropdown">
                        <div class="multi-select-actions">
                            <button type="button" class="btn-select-action btn-ms-all"><i class="fas fa-check-double"></i> Todos</button>
                            <button type="button" class="btn-select-action btn-ms-none"><i class="fas fa-times"></i> Limpar</button>
                        </div>
                        <div class="multi-select-options"></div>
                    </div>
                </div>
            </div>

            <!-- Setor - multi-select dinâmico -->
            <div class="filtro-grupo">
                <label>Setor</label>
                <div class="multi-select-container" id="ms-setor" data-state-key="msSetor" data-placeholder="Todos">
                    <button type="button" class="multi-select-trigger ms-trigger" aria-haspopup="listbox" aria-expanded="false">
                        <span class="multi-select-label">Todos</span>
                        <i class="fas fa-chevron-down multi-select-arrow"></i>
                    </button>
                    <div class="multi-select-dropdown">
                        <div class="multi-select-actions">
                            <button type="button" class="btn-select-action btn-ms-all"><i class="fas fa-check-double"></i> Todos</button>
                            <button type="button" class="btn-select-action btn-ms-none"><i class="fas fa-times"></i> Limpar</button>
                        </div>
                        <div class="multi-select-options"></div>
                    </div>
                </div>
            </div>

            <!-- Médico - multi-select dinâmico -->
            <div class="filtro-grupo">
                <label>Médico</label>
                <div class="multi-select-container" id="ms-medico" data-state-key="msMedico" data-placeholder="Todos">
                    <button type="button" class="multi-select-trigger ms-trigger" aria-haspopup="listbox" aria-expanded="false">
                        <span class="multi-select-label">Todos</span>
                        <i class="fas fa-chevron-down multi-select-arrow"></i>
                    </button>
                    <div class="multi-select-dropdown">
                        <div class="multi-select-actions">
                            <button type="button" class="btn-select-action btn-ms-all"><i class="fas fa-check-double"></i> Todos</button>
                            <button type="button" class="btn-select-action btn-ms-none"><i class="fas fa-times"></i> Limpar</button>
                        </div>
                        <div class="multi-select-options"></div>
                    </div>
                </div>
            </div>

            <!-- Período - select simples -->
            <div class="filtro-grupo">
                <label>Período</label>
                <select id="filtro-periodo" class="filtro-select">
                    <option value="">Todos</option>
                    <option value="7">7 dias</option>
                    <option value="15">15 dias</option>
                    <option value="30" selected>30 dias</option>
                    <option value="60">60 dias</option>
                    <option value="90">90 dias</option>
                </select>
            </div>

            <!-- Busca -->
            <div class="filtro-grupo filtro-busca-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="filtro-busca" placeholder="Buscar paciente, convênio, médico...">
            </div>

            <button id="btn-limpar" class="btn-header btn-limpar" title="Limpar filtros">
                <i class="fas fa-eraser"></i>
            </button>
        </div>
    </div>

    <!-- NAVEGAÇÃO POR ABAS -->
    <div class="tabs-nav">
        <button class="tab-nav-btn active" data-tab="resumo">
            <i class="fas fa-chart-pie"></i> <span>Visão Sintética</span>
        </button>
        <button class="tab-nav-btn" data-tab="autorizacoes">
            <i class="fas fa-list"></i> <span>Autorizações</span>
        </button>
    </div>

    <!-- PAINEIS DAS ABAS -->
    <div class="tab-panels">

        <!-- ABA: Visão Sintética -->
        <div class="tab-panel active" id="tab-resumo">
            <div class="dashboard-content" style="padding: 0 var(--esp-sm);">
                <div class="resumo-toolbar" style="display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: white; border-bottom: 1px solid var(--cor-borda); border-radius: var(--raio-md) var(--raio-md) 0 0; margin-bottom: 10px;">
                    <div class="resumo-info" style="display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--cor-texto-secundario);">
                        <i class="fas fa-circle-info" style="color: var(--cor-primaria);"></i>
                        <span>Visão sintética das autorizações agrupadas por setor de origem</span>
                    </div>
                </div>

                <div id="resumo-sintetico-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; padding-bottom: 20px;">
                    <div class="loading"><div class="loading-spinner"></div><p>Carregando...</p></div>
                </div>
            </div>
        </div>

        <!-- ABA: Autorizações (Conteúdo Antigo) -->
        <div class="tab-panel" id="tab-autorizacoes">
            <div class="dashboard-content" style="display: flex; flex-direction: column; height: 100%;">
                <!-- TABELA -->
                <main class="painel-main" id="painel-main">
                    <div class="tabela-container">
                        <div class="tabela-topo">
                            <span class="tabela-total" id="tabela-total">0 registros</span>
                        </div>
                        <div class="tabela-scroll-x">
                            <table class="painel-table" id="painel-table">
                                <thead>
                                    <tr>
                                        <th class="col-sem"></th>
                                        <th class="col-atend sortable" data-campo="nr_atendimento">Atend. <i class="fas fa-sort"></i></th>
                                        <th class="col-pac sortable" data-campo="nm_paciente">Paciente <i class="fas fa-sort"></i></th>
                                        <th class="col-conv sortable" data-campo="ds_convenio">Convênio <i class="fas fa-sort"></i></th>
                                        <th class="col-tguia">Resumo</th>
                                        <th class="col-setor sortable" data-campo="ds_setor_origem">Setor <i class="fas fa-sort"></i></th>
                                        <th class="col-sla sortable" data-campo="status_sla">SLA <i class="fas fa-sort"></i></th>
                                    </tr>
                                </thead>
                                <tbody id="tabela-tbody">
                                    <tr><td colspan="7" class="loading-cell">
                                        <div class="loading-spinner"></div> Carregando...
                                    </td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="tabela-vazia" id="tabela-vazia" style="display:none;">
                            <i class="fas fa-inbox"></i>
                            <p>Nenhuma autorização encontrada</p>
                            <small>Ajuste os filtros para ampliar a busca</small>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<script src="/paineis/painel33/main.js?v=2.1"></script>
<script src="/static/js/auto-auth.js"></script>
</body>
</html>

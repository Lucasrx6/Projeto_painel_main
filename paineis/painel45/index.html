<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiologia — Enfermagem | Hospital Anchieta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/paineis/painel45/style.css">
    <link rel="stylesheet" href="/frontend/tema.css">
    <link rel="icon" href="/static/img/favicon.png">
    <script>if(localStorage.getItem('tema_sistema')==='azul')document.documentElement.classList.add('tema-azul');</script>
</head>
<body>
<div class="painel-container">

    <!-- HEADER -->
    <header class="painel-header">
        <div class="header-content">
            <div class="header-left">
                <img src="/static/img/logo.png" alt="HAC">
                <h1><i class="fas fa-x-ray"></i> Radiologia — Enfermagem</h1>
            </div>
            <div class="header-right">
                <span class="ultima-atualizacao" id="ultima-atualizacao">--:--</span>
                <button class="btn-header" id="btn-refresh" title="Atualizar"><i class="fas fa-sync-alt"></i></button>
                <button class="btn-header" id="btn-voltar" title="Voltar"><i class="fas fa-arrow-left"></i></button>
            </div>
        </div>
    </header>

    <!-- FILTROS BAR -->
    <div class="filtros-bar">
        <div class="filtros-content">
            <!-- Navegação por data -->
            <div class="data-nav-bar">
                <button class="btn-data-nav" id="btn-data-ant" title="Dia anterior"><i class="fas fa-chevron-left"></i></button>
                <span class="data-nav-label" id="label-data-p45">Hoje</span>
                <button class="btn-data-nav" id="btn-data-prox" title="Próximo dia"><i class="fas fa-chevron-right"></i></button>
                <button class="btn-data-hoje" id="btn-data-hoje" style="display:none;">Hoje</button>
            </div>
            <div class="filtros-row">
                <div class="pills-setor" id="pills-setor">
                    <button class="pill ativo" data-pill="todos">Todos</button>
                </div>
                <div class="filtros-right">
                    <div class="filtro-status-pills" id="filtro-status-pills">
                        <button class="pill-status ativo" data-status="todos">Todos</button>
                        <button class="pill-status pill-aguardando" data-status="pendente">
                            <i class="fas fa-clock"></i> Aguard. Ciência
                        </button>
                        <button class="pill-status pill-ciente" data-status="ciente">
                            <i class="fas fa-check"></i> Ciente
                        </button>
                        <button class="pill-status pill-recusado" data-status="recusado">
                            <i class="fas fa-times"></i> Recusado
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-item-num" id="cnt-total">-</div>
            <div class="stat-item-label">Total</div>
        </div>
        <div class="stat-item urgente">
            <div class="stat-item-num" id="cnt-urgentes">-</div>
            <div class="stat-item-label">Urgentes</div>
        </div>
        <div class="stat-item pendente">
            <div class="stat-item-num" id="cnt-pendentes">-</div>
            <div class="stat-item-label">Aguard. Ciência</div>
        </div>
        <div class="stat-item ciente">
            <div class="stat-item-num" id="cnt-cientes">-</div>
            <div class="stat-item-label">Cientes</div>
        </div>
        <div class="stat-item recusado">
            <div class="stat-item-num" id="cnt-recusados">-</div>
            <div class="stat-item-label">Recusados</div>
        </div>
    </div>

    <!-- MAIN -->
    <main class="main-content" id="main-content">
        <div class="loading"><div class="loading-spinner"></div><span>Carregando...</span></div>
    </main>

    <!-- MODAL: DAR CIÊNCIA -->
    <div id="modal-ciencia" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3><i class="fas fa-check-circle" style="color:#28a745"></i> Dar Ciência</h3>
                <button class="btn-fechar-modal" id="modal-cien-fechar"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="modal-info" id="modal-cien-info"></div>
                <p class="modal-confirm-text">Confirma ciência do agendamento deste exame?</p>
            </div>
            <div class="modal-footer">
                <button class="btn-modal" id="modal-cien-cancelar">Cancelar</button>
                <button class="btn-modal btn-modal-ciente" id="modal-cien-confirmar">
                    <i class="fas fa-check"></i> Confirmar Ciência
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL: RECUSAR -->
    <div id="modal-recusar" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3><i class="fas fa-times-circle" style="color:#dc3545"></i> Recusar Agendamento</h3>
                <button class="btn-fechar-modal" id="modal-rec-fechar"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="modal-info" id="modal-rec-info"></div>
                <div class="form-group">
                    <label>Motivo da recusa <span style="color:#dc3545">*</span></label>
                    <textarea id="modal-rec-motivo" rows="3"
                        placeholder="Informe o motivo (mínimo 10 caracteres)..."></textarea>
                    <small class="form-hint" id="modal-rec-hint" style="color:#dc3545;">
                        <span id="modal-rec-contador">0 / 10 mínimo</span>
                    </small>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal" id="modal-rec-cancelar">Cancelar</button>
                <button class="btn-modal btn-modal-recusar" id="modal-rec-confirmar">
                    <i class="fas fa-times"></i> Recusar
                </button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toast-container"></div>

    <footer class="sistema-footer">
        <span id="sistema-versao-footer">Central de Informações V 1.1.4</span>
    </footer>
</div>

<!--
=============================================================================
  PAINEL 45 — Radiologia / Enfermagem — Mapa de arquivos JS
=============================================================================

  ARQUIVO              RESPONSABILIDADE
  ──────────────────── ─────────────────────────────────────────────────────
  estado.js            window.P45 — CONFIG, Estado (dados, filtros, modalId)
  utils.js             pad2, hojeISO, toast, escHtml, formatarNome,
                       formatarHora, formatarDataHora
  badges.js            badgeEnf, badgeTipo, badgeRadioStatus
  renderizar.js        chaveData, formatarDia, popularPills,
                       atualizarContadores, linhaAgendamentoHtml, renderizar
  carregar.js          carregar — fetch /agendamentos, atualiza Estado.dados
  modais.js            abrirCiencia, fecharCiencia, confirmarCiencia,
                       abrirRecusar, fecharRecusar, confirmarRecusar
  main.js              inicializar — event listeners, pills de status,
                       delegação data-acao, polling

  MAPA DE IDs (elemento → função responsável)
  ──────────────────── ─────────────────────────────────────────────────────
  #pills-setor          popularPills()      [renderizar.js]
  #filtro-status-pills  inicializar()       [main.js]
  #label-data-p45       atualizarNavData()  [main.js]
  #btn-data-ant/prox/   inicializar()       [main.js]
    hoje
  #main-content         renderizar()        [renderizar.js]
  #cnt-total/urgentes/  atualizarContadores() [renderizar.js]
    pendentes/cientes/
    recusados
  #ultima-atualizacao   carregar()          [carregar.js]
  #modal-ciencia        abrirCiencia()      [modais.js]
  #modal-cien-info      abrirCiencia()      [modais.js]
  #modal-cien-confirmar confirmarCiencia()  [modais.js]
  #modal-recusar        abrirRecusar()      [modais.js]
  #modal-rec-info       abrirRecusar()      [modais.js]
  #modal-rec-motivo     confirmarRecusar()  [modais.js]
  #modal-rec-contador   input listener      [main.js]
  #toast-container      toast()             [utils.js]

  FUNÇÕES NO NAMESPACE window.P45
  ─────────────────────────────────────────────────────────────────────────
  pad2, hojeISO, toast, escHtml, formatarNome, formatarHora,
  formatarDataHora                                     [utils.js]
  badgeEnf, badgeTipo, badgeRadioStatus                [badges.js]
  chaveData, formatarDia, popularPills,
  atualizarContadores, linhaAgendamentoHtml, renderizar [renderizar.js]
  carregar                                             [carregar.js]
  abrirCiencia, fecharCiencia, confirmarCiencia,
  abrirRecusar, fecharRecusar, confirmarRecusar         [modais.js]
=============================================================================
-->
<script src="/paineis/painel45/estado.js"></script>
<script src="/paineis/painel45/utils.js"></script>
<script src="/paineis/painel45/badges.js"></script>
<script src="/paineis/painel45/renderizar.js"></script>
<script src="/paineis/painel45/carregar.js"></script>
<script src="/paineis/painel45/modais.js"></script>
<script src="/paineis/painel45/main.js"></script>
<script src="/static/js/versao.js"></script>
<script src="/static/js/auto-auth.js"></script>
</body>
</html>

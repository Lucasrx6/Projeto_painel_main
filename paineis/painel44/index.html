<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub de Serviços - Hospital Anchieta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/paineis/painel44/style.css">
    <link rel="icon" href="/static/img/favicon.png">
    <link rel="stylesheet" href="/frontend/tema.css">
    <script>if(localStorage.getItem('tema_sistema')==='azul')document.documentElement.classList.add('tema-azul');</script>
</head>
<body>
<div class="painel-container">

    <div class="painel-header">
        <div class="header-left">
            <i class="fa-solid fa-table-cells-large header-icon"></i>
            <div>
                <div class="header-titulo">Hub de Serviços</div>
                <div class="header-subtitulo">Hospital Anchieta Ceilândia — Central de Sistemas</div>
            </div>
        </div>
        <div class="header-right">
            <div id="header-usuario" class="header-usuario"></div>
            <button id="btn-voltar-dashboard" class="btn-header" title="Voltar ao Dashboard">
                <i class="fas fa-arrow-left"></i>
            </button>
        </div>
    </div>

    <div class="main-content" id="main-content">
        <div class="loading-hub" id="loading-hub">
            <i class="fa-solid fa-spinner fa-spin"></i>
            <span>Carregando serviços...</span>
        </div>

        <!-- Subsistemas injetados pelo JS -->
        <div id="secao-subsistemas" style="display:none;">
            <div class="secao-titulo">
                <i class="fa-solid fa-cubes"></i> Subsistemas Hospitalares
            </div>
            <div class="subsistemas-grid" id="subsistemas-grid"></div>
        </div>

        <!-- Outros Serviços (hub_servicos dinâmico) -->
        <div id="secao-servicos" style="display:none;">
            <div class="secao-titulo">
                <i class="fa-solid fa-link"></i> Outros Serviços
            </div>
            <div class="servicos-grid" id="servicos-grid"></div>
        </div>

        <!-- Estado vazio -->
        <div id="hub-vazio" class="hub-vazio" style="display:none;">
            <i class="fa-solid fa-lock"></i>
            <p>Nenhum serviço disponível para o seu perfil.</p>
            <p class="hub-vazio-sub">Solicite acesso ao administrador do sistema.</p>
        </div>
    </div>

    <footer class="sistema-footer">
        <span id="sistema-versao-footer">Central de Informações V 1.1.4</span>
    </footer>
</div>

<script src="/paineis/painel44/main.js"></script>
<script src="/static/js/versao.js"></script>
<script src="/static/js/auto-auth.js"></script>
</body>
</html>

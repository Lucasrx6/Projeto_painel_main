<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Chamados de TI - Hospital Anchieta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/paineis/painel28/style_hub.css">
    <link rel="icon" href="/static/img/favicon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#dc3545">
    <style>
        .projeto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            padding: 20px 24px 32px;
            max-width: 960px;
            margin: 0 auto;
            width: 100%;
        }

        .projeto-card {
            background: var(--cor-card);
            border-radius: 14px;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            text-decoration: none;
            color: var(--cor-texto);
            box-shadow: var(--sombra);
            border: 1px solid var(--cor-borda);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .projeto-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--card-accent, var(--cor-primaria));
            border-radius: 14px 14px 0 0;
        }

        .projeto-card:hover,
        .projeto-card:focus {
            transform: translateY(-4px);
            box-shadow: var(--sombra-hover);
            border-color: var(--card-accent, var(--cor-primaria));
            outline: none;
        }

        .projeto-card:active {
            transform: translateY(-1px) scale(0.98);
        }

        .projeto-card-icone {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #fff;
            background: var(--card-accent, var(--cor-primaria));
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .projeto-card:hover .projeto-card-icone {
            transform: scale(1.08);
        }

        .projeto-card-nome {
            font-size: 1rem;
            font-weight: 700;
            text-align: center;
            color: var(--cor-texto);
            line-height: 1.3;
        }

        .projeto-card-descricao {
            font-size: 0.82rem;
            color: var(--cor-texto-sec);
            text-align: center;
            line-height: 1.5;
        }

        .projeto-card-seta {
            margin-top: auto;
            font-size: 1rem;
            color: var(--card-accent, var(--cor-primaria));
            opacity: 0.7;
        }

        /* Cor de destaque por card */
        .card-gestao      { --card-accent: #17a2b8; }
        .card-abertura    { --card-accent: #dc3545; }

        .projeto-titulo {
            text-align: center;
            padding: 20px 24px 4px;
        }

        .projeto-titulo h2 {
            font-size: 1.3rem;
            color: var(--cor-texto);
            font-weight: 700;
        }

        .projeto-titulo p {
            font-size: 0.88rem;
            color: var(--cor-texto-sec);
            margin-top: 4px;
        }

        .main-content {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 480px) {
            .projeto-grid {
                grid-template-columns: 1fr;
                padding: 12px 16px 24px;
                gap: 12px;
            }

            .projeto-card {
                padding: 20px 18px;
                flex-direction: row;
                align-items: center;
                text-align: left;
                gap: 16px;
            }

            .projeto-card-nome,
            .projeto-card-descricao { text-align: left; }

            .projeto-card-icone {
                width: 56px;
                height: 56px;
                font-size: 1.4rem;
                border-radius: 14px;
                flex-shrink: 0;
            }

            .projeto-card-seta {
                margin-top: 0;
                margin-left: auto;
            }
        }
    </style>
    <link rel="stylesheet" href="/frontend/tema.css">
    <script>if(localStorage.getItem('tema_sistema')==='azul')document.documentElement.classList.add('tema-azul');</script>
</head>
<body>
    <div class="painel-container">

        <!-- Cabecalho -->
        <div class="painel-header">
            <div class="header-content">
                <div class="header-left">
                    <img src="/static/img/logo.png" alt="HAC" onerror="this.style.display='none'">
                    <h1><i class="fas fa-headset"></i> Gestão de Chamados de TI</h1>
                </div>
                <div class="header-right">
                    <button id="btn-voltar" class="btn-header" title="Voltar para Central de Servicos">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Conteudo Principal -->
        <div class="main-content">

            <div class="projeto-titulo">
                <h2>Selecione uma Área</h2>
                <p>Abertura e monitoramento de chamados emergenciais</p>
            </div>

            <div class="projeto-grid">

                <!-- Card 1: Abrir Chamados (Painel 15) -->
                <a class="projeto-card card-abertura"
                   href="/painel/painel15"
                   data-painel="painel15"
                   role="button"
                   tabindex="0"
                   style="display: none;"
                   aria-label="Acessar Abertura de Chamados">
                    <div class="projeto-card-icone">
                        <i class="fas fa-triangle-exclamation"></i>
                    </div>
                    <div class="projeto-card-nome">Abrir Chamados</div>
                    <div class="projeto-card-descricao">
                        Abertura de chamados emergenciais para a equipe de TI
                    </div>
                    <div class="projeto-card-seta">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </a>

                <!-- Card 2: Gestao Chamados (Painel 14) -->
                <a class="projeto-card card-gestao"
                   href="/painel/painel14"
                   data-painel="painel14"
                   role="button"
                   tabindex="0"
                   style="display: none;"
                   aria-label="Acessar Gestão de Chamados">
                    <div class="projeto-card-icone">
                        <i class="fas fa-headset"></i>
                    </div>
                    <div class="projeto-card-nome">Gestão de Chamados</div>
                    <div class="projeto-card-descricao">
                        Painel de monitoramento e gerenciamento de chamados abertos
                    </div>
                    <div class="projeto-card-seta">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </a>

            </div>
        </div>

        <!-- Rodape -->
        <div class="hub-footer">
            <span>Hospital Anchieta Ceilandia</span>
            <span class="footer-sep">|</span>
            <span>Gestão de Chamados de TI</span>
        </div>

    </div>

    <script>
        (function () {
            'use strict';

            document.addEventListener('DOMContentLoaded', function () {
                var btnVoltar = document.getElementById('btn-voltar');
                if (btnVoltar) {
                    btnVoltar.addEventListener('click', function () {
                        window.location.href = '/painel/painel28';
                    });
                }

                // Verificar permissões para mostrar/esconder os cards
                fetch('/api/minhas-permissoes')
                    .then(function(res) { return res.json(); })
                    .then(function(data) {
                        var isAdmin = data.is_admin || false;
                        var permissoes = data.permissoes || [];
                        var cards = document.querySelectorAll('.projeto-card[data-painel]');

                        cards.forEach(function(card) {
                            var painelId = card.getAttribute('data-painel');
                            if (isAdmin || permissoes.includes(painelId)) {
                                card.style.display = 'flex';
                            } else {
                                card.style.display = 'none';
                            }
                        });
                    })
                    .catch(function(err) {
                        console.error('Erro ao buscar permissões:', err);
                    });
            });
        })();
    </script>
    <script src="/static/js/auto-auth.js"></script>
</body>
</html>
